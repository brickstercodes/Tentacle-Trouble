<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <meta charset="UTF-8" />
    <title>Octo Controller</title>
    <script
      type="text/javascript"
      src="https://www.airconsole.com/api/airconsole-1.9.0.js"
    ></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://www.airconsole.com/controls/airconsole-controls.css"
    />
    <script
      type="text/javascript"
      src="https://www.airconsole.com/controls/airconsole-controls.js"
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        touch-action: none;
      }
      #container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
      }
      .joystick-area {
        width: 48%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .label {
        position: absolute;
        top: 10px;
        color: white;
        font-family: Arial, sans-serif;
        font-size: 12px;
      }
      .left-label {
        left: 20%;
      }
      .right-label {
        right: 20%;
      }
    </style>
  </head>
  <body>
    <div class="label left-label">LEFT</div>
    <div class="label right-label">RIGHT</div>
    <div id="container">
      <div class="joystick-area" id="joystick-left"></div>
      <div class="joystick-area" id="joystick-right"></div>
    </div>

    <script type="text/javascript">
      function App() {
        var me = this;
        me.airconsole = new AirConsole({ orientation: "landscape" });

        me.leftInput = { x: 0, y: 0 };
        me.rightInput = { x: 0, y: 0 };

        // Create left joystick
        me.leftJoystick = new Joystick(
          document.getElementById("joystick-left"),
          {
            touchstart: function () {},
            touchmove: function (position) {
              me.leftInput.x = position.x;
              me.leftInput.y = -position.y; // Invert Y for Unity
            },
            touchend: function () {
              me.leftInput.x = 0;
              me.leftInput.y = 0;
            },
          },
        );

        // Create right joystick
        me.rightJoystick = new Joystick(
          document.getElementById("joystick-right"),
          {
            touchstart: function () {},
            touchmove: function (position) {
              me.rightInput.x = position.x;
              me.rightInput.y = -position.y; // Invert Y for Unity
            },
            touchend: function () {
              me.rightInput.x = 0;
              me.rightInput.y = 0;
            },
          },
        );

        me.airconsole.onReady = function (code) {
          console.log("AirConsole ready:", code);
        };

        // Send input at 30fps
        setInterval(function () {
          me.airconsole.message(AirConsole.SCREEN, {
            type: "dual_joystick",
            left: { x: me.leftInput.x, y: me.leftInput.y },
            right: { x: me.rightInput.x, y: me.rightInput.y },
          });
        }, 33);
      }

      window.onload = function () {
        new App();
      };
    </script>
  </body>
</html>
